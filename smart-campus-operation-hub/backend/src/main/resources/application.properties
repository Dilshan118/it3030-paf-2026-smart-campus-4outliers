spring.application.name=smart-campus-operation-hub
spring.config.import=optional:file:.env[.properties]

# Database Connection — Neon PostgreSQL (loaded from .env)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# H2 Console (disabled in production, enable for local-only debugging)
spring.h2.console.enabled=false

# Spring Data JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
spring.web.resources.static-locations=file:uploads/,classpath:/static/

# server.port=8081

# JWT Configuration
jwt.secret=${JWT_SECRET:smartCampusJwtSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm2026}
jwt.expiration-ms=86400000

# Frontend URL (for OAuth2 redirect)
frontend.url=${FRONTEND_URL:http://localhost:5173}

# Google OAuth2 (set GOOGLE_CLIENT_ID and GOOGLE_CLIENT_SECRET in .env)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-google-client-secret}
spring.security.oauth2.client.registration.google.scope=email,profile