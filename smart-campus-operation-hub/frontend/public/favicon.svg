<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background pill -->
  <rect width="32" height="32" rx="8" fill="#2A14B4"/>

  <!-- Main building body -->
  <rect x="7" y="15" width="18" height="12" rx="1" fill="white" fill-opacity="0.95"/>

  <!-- Roof -->
  <polygon points="16,6 5,16 27,16" fill="white"/>

  <!-- Door -->
  <rect x="13.5" y="20" width="5" height="7" rx="0.8" fill="#2A14B4"/>

  <!-- Left window -->
  <rect x="8.5" y="18" width="3.5" height="2.5" rx="0.5" fill="#6366f1" fill-opacity="0.6"/>

  <!-- Right window -->
  <rect x="20" y="18" width="3.5" height="2.5" rx="0.5" fill="#6366f1" fill-opacity="0.6"/>

  <!-- Flagpole -->
  <line x1="16" y1="6" x2="16" y2="3" stroke="white" stroke-width="1" stroke-linecap="round"/>

  <!-- Flag -->
  <polygon points="16,3 21,4.5 16,6" fill="#A78BFA"/>
</svg>
